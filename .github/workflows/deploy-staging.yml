name: Web Deploy - STAGING

on:
  push:
    branches:
      - 1a-staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.STAGING_AWS_REGION || 'eu-west-1' }}
  STAGING_BRANCH: "1a-staging"
  STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR || '/home/ubuntu/6529seize-frontend' }}
  STAGING_RUN_AS: ${{ vars.STAGING_RUN_AS || 'ubuntu' }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.STAGING_BRANCH }}
          fetch-depth: 0

      - name: Resolve expected commit
        id: expected-commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve production candidate
        id: production-candidate
        run: |
          set -euo pipefail

          git fetch --no-tags origin main
          main_sha="$(git rev-parse origin/main)"
          if git merge-base --is-ancestor "$main_sha" "${{ steps.expected-commit.outputs.sha }}"; then
            echo "sha=$main_sha" >> "$GITHUB_OUTPUT"
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "Staging candidate contains origin/main $main_sha."
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Staging candidate does not contain origin/main $main_sha; marking manifest as exploratory."
          fi

      - name: Create deployment bus manifest
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs create-manifest \
            --environment staging \
            --staging-branch "${STAGING_BRANCH}" \
            --staging-deploy-sha "${{ steps.expected-commit.outputs.sha }}" \
            --production-candidate-sha "${{ steps.production-candidate.outputs.sha }}" \
            --production-eligible "${{ steps.production-candidate.outputs.eligible }}" \
            --release-captain "github-actions/${{ github.actor }}" \
            --status queued \
            --phase queued \
            --message "Staging deployment queued for ${{ steps.expected-commit.outputs.sha }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output deployment-bus-manifest.json

      - name: Create GitHub deployment record
        id: deployment-record
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          deployment_id="$(node ops/scripts/deployment-bus.cjs github-create-deployment \
            --file deployment-bus-manifest.json \
            --ref "${{ steps.expected-commit.outputs.sha }}" \
            --environment staging \
            --task deploy:staging \
            --description "Staging deployment bus ${{ steps.expected-commit.outputs.sha }}")"
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Mark staging deployment queued
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state queued \
            --description "Staging deployment bus queued" \
            --environment-url "https://staging.6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Validate staging configuration
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          set -euo pipefail

          test -n "$AWS_ACCESS_KEY_ID" || {
            echo "Missing AWS_ACCESS_KEY_ID secret." >&2
            exit 1
          }
          test -n "$AWS_SECRET_ACCESS_KEY" || {
            echo "Missing AWS_SECRET_ACCESS_KEY secret." >&2
            exit 1
          }
          test -n "$INSTANCE_ID" || {
            echo "Missing STAGING_INSTANCE_ID secret." >&2
            exit 1
          }
          test -n "$AWS_REGION" || {
            echo "Missing AWS region. Set STAGING_AWS_REGION or use the default." >&2
            exit 1
          }
          test -n "$STAGING_REPO_DIR" || {
            echo "Missing staging repo directory." >&2
            exit 1
          }
          test -n "$STAGING_RUN_AS" || {
            echo "Missing staging run-as user." >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify staging instance is online in SSM
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          set -euo pipefail

          instance_info="$(
            aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --output json
          )"

          managed_count="$(jq '.InstanceInformationList | length' <<< "$instance_info")"
          if [ "$managed_count" -ne 1 ]; then
            echo "Instance $INSTANCE_ID is not registered as an SSM managed node in $AWS_REGION for these AWS credentials." >&2
            echo "Check that the EC2 instance is in this account/region, has an IAM instance profile with AmazonSSMManagedInstanceCore, has SSM Agent running, and has outbound HTTPS access to SSM." >&2
            exit 1
          fi

          ping_status="$(jq -r '.InstanceInformationList[0].PingStatus' <<< "$instance_info")"
          if [ "$ping_status" != "Online" ]; then
            echo "Instance $INSTANCE_ID is registered in SSM but is not Online. Current PingStatus: $ping_status" >&2
            exit 1
          fi

          echo "Instance $INSTANCE_ID is online in SSM."

      - name: Send staging deploy command
        id: send-command
        env:
          BRANCH: ${{ env.STAGING_BRANCH }}
          EXPECTED_SHA: ${{ steps.expected-commit.outputs.sha }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          REPO_DIR: ${{ env.STAGING_REPO_DIR }}
          RUN_AS: ${{ env.STAGING_RUN_AS }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state in_progress \
            --description "Sending staging SSM deploy command" \
            --environment-url "https://staging.6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          repo_dir_q="$(printf '%q' "$REPO_DIR")"
          run_as_q="$(printf '%q' "$RUN_AS")"
          branch_q="$(printf '%q' "$BRANCH")"
          expected_sha_q="$(printf '%q' "$EXPECTED_SHA")"

          remote_script="$(
            cat <<REMOTE_SCRIPT_VARS
          set -eu
          REPO_DIR=$repo_dir_q
          RUN_AS=$run_as_q
          BRANCH=$branch_q
          EXPECTED_SHA=$expected_sha_q
          REMOTE_SCRIPT_VARS
            cat <<'REMOTE_SCRIPT_BODY'

          echo "Starting staging deploy on $(hostname) at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if ! id "$RUN_AS" >/dev/null 2>&1; then
            echo "Run-as user '$RUN_AS' does not exist." >&2
            exit 1
          fi

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Repo directory '$REPO_DIR' is not a git checkout." >&2
            exit 1
          fi

          sfw_bin="$(command -v sfw || true)"
          if [ -n "$sfw_bin" ] && command -v node >/dev/null 2>&1; then
            sfw_root="$(
              node - "$sfw_bin" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          let current = fs.realpathSync(process.argv[2]);
          if (fs.statSync(current).isFile()) {
            current = path.dirname(current);
          }

          while (current !== path.dirname(current)) {
            const packageJson = path.join(current, "package.json");
            if (fs.existsSync(packageJson)) {
              try {
                const manifest = JSON.parse(fs.readFileSync(packageJson, "utf8"));
                if (manifest.name === "sfw") {
                  console.log(current);
                  process.exit(0);
                }
              } catch {
                process.exit(1);
              }
            }
            current = path.dirname(current);
          }

          process.exit(1);
          NODE
              true
            )"

            if [ -n "$sfw_root" ]; then
              echo "Preparing Socket Firewall cache at $sfw_root/.sfw-cache"
              mkdir -p "$sfw_root/.sfw-cache"
              chown -R "$RUN_AS:$RUN_AS" "$sfw_root/.sfw-cache"
            else
              echo "Could not resolve Socket Firewall package root for $sfw_bin; continuing without cache preparation."
            fi
          fi

          deploy_script="$(mktemp /tmp/6529-staging-deploy.XXXXXX.sh)"
          cleanup() {
            rm -f "$deploy_script"
          }
          trap cleanup EXIT HUP INT TERM

          cat > "$deploy_script" <<'DEPLOY_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "$#" -ne 3 ]]; then
            echo "Usage: $0 <repo-dir> <branch> <expected-sha>" >&2
            exit 1
          fi

          REPO_DIR="$1"
          BRANCH="$2"
          EXPECTED_SHA="$3"

          cd "$REPO_DIR"

          echo "Repository: $(pwd)"
          echo "Deploying branch: $BRANCH"
          echo "Expected commit: $EXPECTED_SHA"

          git fetch --no-tags origin "$BRANCH"
          remote_sha="$(git rev-parse FETCH_HEAD)"
          if [[ "$remote_sha" != "$EXPECTED_SHA" ]]; then
            echo "origin $BRANCH is $remote_sha, expected $EXPECTED_SHA." >&2
            echo "A newer staging push may have superseded this run; refusing to deploy a different commit." >&2
            exit 1
          fi

          echo "Resetting deploy checkout before switching to $BRANCH"
          git reset --hard HEAD
          git clean -fd generated

          git checkout -B "$BRANCH" FETCH_HEAD
          git config "branch.$BRANCH.remote" origin
          git config "branch.$BRANCH.merge" "refs/heads/$BRANCH"
          git reset --hard FETCH_HEAD

          SKIP_STAGING_PULL=1 ./bin/6529 staging

          deployed_sha="$(git rev-parse HEAD)"
          echo "Deployed commit: $deployed_sha"
          if [[ "$deployed_sha" != "$EXPECTED_SHA" ]]; then
            echo "Expected $EXPECTED_SHA but deployed $deployed_sha" >&2
            exit 1
          fi

          pm2 describe 6529seize >/dev/null
          pm2 status 6529seize
          DEPLOY_SCRIPT

          chmod 755 "$deploy_script"
          sudo -H -u "$RUN_AS" bash "$deploy_script" "$REPO_DIR" "$BRANCH" "$EXPECTED_SHA"
          REMOTE_SCRIPT_BODY
          )"

          jq -n \
            --arg command "$remote_script" \
            '{commands: [$command], executionTimeout: ["3600"]}' \
            > ssm-parameters.json

          command_id="$(
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy 6529seize frontend staging ${EXPECTED_SHA}" \
              --parameters file://ssm-parameters.json \
              --timeout-seconds 3600 \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command-id=$command_id" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command $command_id"

      - name: Wait for staging deploy
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command-id }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          DEPLOYMENT_ID: ${{ steps.deployment-record.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          print_invocation_logs() {
            echo "----- SSM stdout -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true

            echo "----- SSM stderr -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text || true
          }

          terminal_status=""
          for attempt in {1..240}; do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text 2>/tmp/ssm-status-error || true
            )"

            if [ -z "$status" ]; then
              echo "Waiting for SSM invocation to be available... attempt $attempt"
              sleep 15
              continue
            fi

            echo "SSM status: $status"
            if [ $((attempt % 40)) -eq 0 ]; then
              node ops/scripts/deployment-bus.cjs github-create-status \
                --deployment-id "$DEPLOYMENT_ID" \
                --state in_progress \
                --description "Staging SSM status after $((attempt * 15 / 60)) minutes: $status" \
                --environment-url "https://staging.6529.io" \
                --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
            fi

            case "$status" in
              Success)
                terminal_status="$status"
                break
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                terminal_status="$status"
                break
                ;;
            esac

            sleep 15
          done

          print_invocation_logs

          if [ "$terminal_status" != "Success" ]; then
            echo "Staging deploy failed with SSM status: ${terminal_status:-unknown}" >&2
            exit 1
          fi

      - name: Mark staging deployment terminal
        if: always() && steps.deployment-record.outputs.deployment_id != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          case "$JOB_STATUS" in
            success)
              state="success"
              description="Staging deployment verified"
              ;;
            cancelled)
              state="error"
              description="Staging deployment cancelled before verification"
              ;;
            *)
              state="failure"
              description="Staging deployment failed before verification"
              ;;
          esac

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state "$state" \
            --description "$description" \
            --environment-url "https://staging.6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload deployment bus manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deployment-bus-staging-${{ steps.expected-commit.outputs.sha || github.run_id }}
          path: deployment-bus-manifest.json
          if-no-files-found: ignore
          retention-days: 30
