name: Web Deploy - STAGING

on:
  push:
    branches:
      - 1a-staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.STAGING_AWS_REGION || 'eu-west-1' }}
  STAGING_BRANCH: "1a-staging"
  STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR || '/home/ubuntu/6529seize-frontend' }}
  STAGING_RUN_AS: ${{ vars.STAGING_RUN_AS || 'ubuntu' }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.STAGING_BRANCH }}
          fetch-depth: 1

      - name: Resolve expected commit
        id: expected-commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate staging configuration
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          set -euo pipefail

          test -n "$AWS_ACCESS_KEY_ID" || {
            echo "Missing AWS_ACCESS_KEY_ID secret." >&2
            exit 1
          }
          test -n "$AWS_SECRET_ACCESS_KEY" || {
            echo "Missing AWS_SECRET_ACCESS_KEY secret." >&2
            exit 1
          }
          test -n "$INSTANCE_ID" || {
            echo "Missing STAGING_INSTANCE_ID repository variable." >&2
            exit 1
          }
          test -n "$AWS_REGION" || {
            echo "Missing AWS region. Set STAGING_AWS_REGION or use the default." >&2
            exit 1
          }
          test -n "$STAGING_REPO_DIR" || {
            echo "Missing staging repo directory." >&2
            exit 1
          }
          test -n "$STAGING_RUN_AS" || {
            echo "Missing staging run-as user." >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send staging deploy command
        id: send-command
        env:
          BRANCH: ${{ env.STAGING_BRANCH }}
          EXPECTED_SHA: ${{ steps.expected-commit.outputs.sha }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          REPO_DIR: ${{ env.STAGING_REPO_DIR }}
          RUN_AS: ${{ env.STAGING_RUN_AS }}
        run: |
          set -euo pipefail

          repo_dir_q="$(printf '%q' "$REPO_DIR")"
          run_as_q="$(printf '%q' "$RUN_AS")"
          branch_q="$(printf '%q' "$BRANCH")"
          expected_sha_q="$(printf '%q' "$EXPECTED_SHA")"

          remote_script="$(
            cat <<REMOTE_SCRIPT_VARS
          set -euo pipefail
          REPO_DIR=$repo_dir_q
          RUN_AS=$run_as_q
          BRANCH=$branch_q
          EXPECTED_SHA=$expected_sha_q
          REMOTE_SCRIPT_VARS
            cat <<'REMOTE_SCRIPT_BODY'

          echo "Starting staging deploy on $(hostname) at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if ! id "$RUN_AS" >/dev/null 2>&1; then
            echo "Run-as user '$RUN_AS' does not exist." >&2
            exit 1
          fi

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Repo directory '$REPO_DIR' is not a git checkout." >&2
            exit 1
          fi

          sudo -Hiu "$RUN_AS" env \
            REPO_DIR="$REPO_DIR" \
            BRANCH="$BRANCH" \
            EXPECTED_SHA="$EXPECTED_SHA" \
            bash -lc '
              set -euo pipefail

              cd "$REPO_DIR"

              echo "Repository: $(pwd)"
              echo "Deploying branch: $BRANCH"
              echo "Expected commit: $EXPECTED_SHA"

              git fetch --prune origin "$BRANCH:refs/remotes/origin/$BRANCH"
              remote_sha="$(git rev-parse "origin/$BRANCH")"
              if [ "$remote_sha" != "$EXPECTED_SHA" ]; then
                echo "origin/$BRANCH is $remote_sha, expected $EXPECTED_SHA." >&2
                echo "A newer staging push may have superseded this run; refusing to deploy a different commit." >&2
                exit 1
              fi

              git checkout -B "$BRANCH" "origin/$BRANCH"
              git branch --set-upstream-to="origin/$BRANCH" "$BRANCH"
              git reset --hard "origin/$BRANCH"

              SKIP_STAGING_PULL=1 ./bin/6529 staging

              deployed_sha="$(git rev-parse HEAD)"
              echo "Deployed commit: $deployed_sha"
              if [ "$deployed_sha" != "$EXPECTED_SHA" ]; then
                echo "Expected $EXPECTED_SHA but deployed $deployed_sha" >&2
                exit 1
              fi

              pm2 describe 6529seize >/dev/null
              pm2 status 6529seize
            '
          REMOTE_SCRIPT_BODY
          )"

          jq -n \
            --arg command "$remote_script" \
            '{commands: [$command], executionTimeout: ["3600"]}' \
            > ssm-parameters.json

          command_id="$(
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy 6529seize frontend staging ${EXPECTED_SHA}" \
              --parameters file://ssm-parameters.json \
              --timeout-seconds 3600 \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command-id=$command_id" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command $command_id"

      - name: Wait for staging deploy
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command-id }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          set -euo pipefail

          print_invocation_logs() {
            echo "----- SSM stdout -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true

            echo "----- SSM stderr -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text || true
          }

          terminal_status=""
          for attempt in {1..240}; do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text 2>/tmp/ssm-status-error || true
            )"

            if [ -z "$status" ]; then
              echo "Waiting for SSM invocation to be available... attempt $attempt"
              sleep 15
              continue
            fi

            echo "SSM status: $status"
            case "$status" in
              Success)
                terminal_status="$status"
                break
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                terminal_status="$status"
                break
                ;;
            esac

            sleep 15
          done

          print_invocation_logs

          if [ "$terminal_status" != "Success" ]; then
            echo "Staging deploy failed with SSM status: ${terminal_status:-unknown}" >&2
            exit 1
          fi
