name: Release Bus v2 - Compose Frontend

on:
  workflow_dispatch:
    inputs:
      release_train_id: { type: string, required: true }
      release_train_revision: { type: string, required: true }
      operation_key: { type: string, required: true }
      base_sha: { type: string, required: true }
      expected_sha: { type: string, required: true }
      candidate_shas: { type: string, required: true }
      release_branch: { type: string, required: true }

permissions:
  contents: read

run-name: Compose frontend v2 train ${{ inputs.release_train_id }} [${{ inputs.operation_key }}]

jobs:
  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate immutable inputs
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          CANDIDATE_SHAS: ${{ inputs.candidate_shas }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          [[ "$BASE_SHA" =~ ^[a-f0-9]{40}$ ]]
          test "$BASE_SHA" = "$EXPECTED_SHA"
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$OPERATION_KEY" =~ ^rb2:[A-Za-z0-9:._-]+:a[1-9][0-9]*$ ]]
          [[ "$RELEASE_BRANCH" =~ ^release-bus-v2/(staging|production|qualification)-train-[A-Za-z0-9._-]+$ ]]
          jq -e 'type == "array" and length > 0 and all(.[]; test("^[a-f0-9]{40}$"))' <<< "$CANDIDATE_SHAS"
      - name: Authorize exact v2 operation
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg expected_sha "$EXPECTED_SHA" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:null,repository:"frontend",environment:"orchestration",service:null,expected_sha:$expected_sha,artifact_digest:null}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/authorize"
      - name: Check out exact base without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.base_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Compose deterministic candidate set
        id: compose
        continue-on-error: true
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          CANDIDATE_SHAS: ${{ inputs.candidate_shas }}
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          RELEASE_BUS_GIT_EMAIL: ${{ vars.RELEASE_BUS_GIT_EMAIL || 'release-bus@users.noreply.github.com' }}
          RELEASE_BUS_GIT_NAME: ${{ vars.RELEASE_BUS_GIT_NAME || '6529 Release Bus' }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          existing="$(git ls-remote origin "refs/heads/$RELEASE_BRANCH" | cut -f1)"
          if [ -n "$existing" ]; then
            git fetch --no-tags origin "$existing"
            git merge-base --is-ancestor "$BASE_SHA" "$existing"
            excluded='[]'
            while IFS= read -r sha; do
              if ! git merge-base --is-ancestor "$sha" "$existing"; then
                excluded="$(jq -c --arg sha "$sha" '. + [$sha]' <<< "$excluded")"
              fi
            done < <(jq -r '.[]' <<< "$CANDIDATE_SHAS")
            jq -n --arg composed_sha "$existing" --argjson excluded_shas "$excluded" '{composed_sha:$composed_sha,excluded_shas:$excluded_shas,reused:true}' > "$RUNNER_TEMP/composition.json"
            exit 0
          fi
          git config user.name "$RELEASE_BUS_GIT_NAME"
          git config user.email "$RELEASE_BUS_GIT_EMAIL"
          git switch -c "$RELEASE_BRANCH"
          excluded='[]'
          while IFS= read -r sha; do
            git fetch --no-tags origin "$sha"
            if git merge --no-ff --no-commit "$sha"; then
              git -c core.hooksPath=/dev/null commit -s \
                -m "Release Bus v2 train $TRAIN_ID: merge frontend candidate" \
                -m "Candidate-SHA: $sha" \
                -m "Release-Bus-v2-Train: $TRAIN_ID"
            else
              git merge --abort
              excluded="$(jq -c --arg sha "$sha" '. + [$sha]' <<< "$excluded")"
            fi
          done < <(jq -r '.[]' <<< "$CANDIDATE_SHAS")
          git fsck --no-dangling
          jq -n --arg composed_sha "$(git rev-parse HEAD)" --argjson excluded_shas "$excluded" '{composed_sha:$composed_sha,excluded_shas:$excluded_shas,reused:false}' > "$RUNNER_TEMP/composition.json"
      - name: Create scoped GitHub App token
        if: steps.compose.outcome == 'success'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_BUS_GITHUB_APP_ID }}
          private-key: ${{ secrets.RELEASE_BUS_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: 6529seize-frontend
          permission-contents: write
      - name: Publish immutable branch once
        if: steps.compose.outcome == 'success'
        id: publish
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          set -euo pipefail
          composed_sha="$(jq -r '.composed_sha' "$RUNNER_TEMP/composition.json")"
          existing="$(git ls-remote origin "refs/heads/$RELEASE_BRANCH" | cut -f1)"
          if [ -n "$existing" ]; then
            test "$existing" = "$composed_sha"
          else
            git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$composed_sha:refs/heads/$RELEASE_BRANCH"
          fi
      - name: Report structured terminal result
        if: always()
        env:
          COMPOSE_OUTCOME: ${{ steps.compose.outcome }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          if [ "$COMPOSE_OUTCOME" = success ] && [ "$PUBLISH_OUTCOME" = success ] && [ -s "$RUNNER_TEMP/composition.json" ]; then
            status=SUCCEEDED; failure_class=null; retryable=false
            summary="$(cat "$RUNNER_TEMP/composition.json")"
          else
            status=FAILED; failure_class=INFRASTRUCTURE; retryable=true; summary=null
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --argjson retryable "$retryable" --argjson summary "$summary" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"compose",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $status == "FAILED" then "compose_or_publish" else null end),retryable:$retryable,summary:$summary,stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Return authoritative composition result
        if: always()
        env:
          COMPOSE_OUTCOME: ${{ steps.compose.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: test "$COMPOSE_OUTCOME" = success -a "$PUBLISH_OUTCOME" = success
