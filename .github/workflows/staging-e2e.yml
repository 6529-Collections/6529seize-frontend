name: Staging E2E

on:
  workflow_run:
    workflows: ["Web Deploy - STAGING"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pack:
        description: Staging E2E pack to run
        type: choice
        required: true
        default: all
        options:
          - all
          - smoke
          - core
          - social-readonly
          - public-groups-tools-readonly
          - delegation-readonly
          - collections-readonly
          - admin-guards-readonly
          - public-content-readonly
          - profile-deep-links-readonly
          - search-waves-readonly
          - media-readonly
          - network-open-data-readonly

permissions:
  contents: read

concurrency:
  group: staging-e2e
  # Staging is a single mutable environment. Cancel superseded runs so an
  # older deployed SHA does not keep testing after a newer staging deploy lands.
  cancel-in-progress: true

jobs:
  staging-packs:
    name: Staging E2E packs
    # Trust gate: this job holds a secret and executes checked-out code, so
    # workflow_run triggers must come from this repository's own 1a-staging
    # branch (staging deploys are push-triggered; forks cannot push there).
    # The explicit head_repository/head_branch conditions keep that invariant
    # enforced even if the upstream deploy workflow's triggers ever change.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == '1a-staging'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLAYWRIGHT_STAGING_ACCESS_CODE: ${{ secrets.PLAYWRIGHT_STAGING_ACCESS_CODE }}
      SELECTED_PACK: ${{ github.event.inputs.pack || 'all' }}
    steps:
      # workflow_run: the exact SHA the staging deploy shipped. Manual
      # dispatch falls back to the branch tip, which may differ from what is
      # currently deployed to staging — fine for ad-hoc reruns, but prefer
      # letting the deploy trigger this workflow for deployed-SHA fidelity.
      - name: Check out the deployed ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Activate pinned pnpm
        run: |
          corepack enable pnpm
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install Socket Firewall
        id: socket_firewall
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with:
          mode: firewall

      - name: Assert npm lockfile is absent
        run: ./bin/6529 guard:no-package-lock

      - name: Install dependencies
        env:
          SFW_BIN: ${{ steps.socket_firewall.outputs.firewall-path-binary }}
        run: ./bin/6529 install:frozen

      - name: Install Playwright browser
        run: ./bin/6529 exec playwright install --with-deps chromium

      - name: Run staging packs against staging.6529.io
        run: |
          set -uo pipefail
          packs=(
            test:e2e:staging:smoke
            test:e2e:staging
            test:e2e:staging:social-readonly
            test:e2e:staging:public-groups-tools-readonly
            test:e2e:staging:delegation-readonly
            test:e2e:staging:collections-readonly
            test:e2e:staging:admin-guards-readonly
            test:e2e:staging:public-content-readonly
            test:e2e:staging:profile-deep-links-readonly
            test:e2e:staging:search-waves-readonly
            test:e2e:staging:media-readonly
            test:e2e:staging:network-open-data-readonly
          )
          selected_pack="${SELECTED_PACK:-all}"
          case "$selected_pack" in
            all)
              ;;
            smoke)
              packs=(test:e2e:staging:smoke)
              ;;
            core)
              packs=(test:e2e:staging)
              ;;
            social-readonly)
              packs=(test:e2e:staging:social-readonly)
              ;;
            public-groups-tools-readonly)
              packs=(test:e2e:staging:public-groups-tools-readonly)
              ;;
            delegation-readonly)
              packs=(test:e2e:staging:delegation-readonly)
              ;;
            collections-readonly)
              packs=(test:e2e:staging:collections-readonly)
              ;;
            admin-guards-readonly)
              packs=(test:e2e:staging:admin-guards-readonly)
              ;;
            public-content-readonly)
              packs=(test:e2e:staging:public-content-readonly)
              ;;
            profile-deep-links-readonly)
              packs=(test:e2e:staging:profile-deep-links-readonly)
              ;;
            search-waves-readonly)
              packs=(test:e2e:staging:search-waves-readonly)
              ;;
            media-readonly)
              packs=(test:e2e:staging:media-readonly)
              ;;
            network-open-data-readonly)
              packs=(test:e2e:staging:network-open-data-readonly)
              ;;
            *)
              echo "::error::Unsupported staging E2E pack: $selected_pack"
              exit 1
              ;;
          esac

          artifact_root="staging-e2e-artifacts"
          rm -rf "$artifact_root"
          mkdir -p "$artifact_root"
          failed=0
          echo "## Staging E2E packs" >> "$GITHUB_STEP_SUMMARY"
          echo "Selected pack: \`$selected_pack\`" >> "$GITHUB_STEP_SUMMARY"
          for pack in "${packs[@]}"; do
            pack_slug="${pack//:/-}"
            pack_artifacts="$artifact_root/$pack_slug"
            pack_log="$pack_artifacts/output.log"
            mkdir -p "$pack_artifacts"
            rm -rf test-results playwright-report

            if ./bin/6529 run "$pack" 2>&1 | tee "$pack_log"; then
              {
                echo "- :white_check_mark: \`$pack\`"
                echo "  - Artifacts: \`$pack_artifacts/\`"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              failed=1
              {
                echo "- :x: \`$pack\`"
                echo "  - Artifacts: \`$pack_artifacts/\`"
                echo ""
                echo "<details><summary>Last 25 log lines for \`$pack\`</summary>"
                echo ""
                echo '```'
                tail -25 "$pack_log"
                echo '```'
                echo ""
                echo "</details>"
              } >> "$GITHUB_STEP_SUMMARY"
            fi

            for path in test-results playwright-report; do
              if [ -e "$path" ]; then
                cp -R "$path" "$pack_artifacts/"
              fi
            done
          done
          exit "$failed"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-e2e-artifacts
          path: staging-e2e-artifacts/
          retention-days: 7
          if-no-files-found: ignore
