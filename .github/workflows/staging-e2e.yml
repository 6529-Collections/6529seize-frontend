name: Staging E2E

on:
  workflow_run:
    workflows: ["Web Deploy - STAGING"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pack:
        description: Post-deploy manifest alias or script key; use all for the full set
        type: string
        required: true
        default: all
      release_train_id:
        description: Release Bus train id
        type: string
        required: false
      release_train_revision:
        description: Release Bus train revision
        type: string
        required: false
      operation_key:
        description: Release Bus idempotency key
        type: string
        required: false
      source_ref:
        description: Immutable Release Bus source ref
        type: string
        required: false
      expected_sha:
        description: Immutable deployed SHA
        type: string
        required: false
      release_manifest_id:
        description: Exact Release Bus v2 manifest id
        type: string
        required: false
      release_manifest_identity_sha256:
        description: Exact Release Bus v2 manifest identity digest
        type: string
        required: false
      frontend_sha: { type: string, required: false }
      backend_sha: { type: string, required: false }
      frontend_artifact_digest: { type: string, required: false }
      backend_artifact_digest: { type: string, required: false }

permissions:
  contents: read

run-name: Staging E2E [${{ inputs.operation_key || 'automatic' }}]

concurrency:
  group: staging-e2e
  # Staging is a single mutable environment. Release Bus v2 freezes staging
  # during exact E2E ownership, so an older run must never be cancelled by a
  # later dispatch.
  cancel-in-progress: false

jobs:
  staging-packs:
    name: Staging E2E packs
    # Trust gate: this job holds a secret and executes checked-out code, so
    # workflow_run triggers must come from this repository's own 1a-staging
    # branch (staging deploys are push-triggered; forks cannot push there).
    # The explicit head_repository/head_branch conditions keep that invariant
    # enforced even if the upstream deploy workflow's triggers ever change.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == '1a-staging'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLAYWRIGHT_STAGING_ACCESS_CODE: ${{ secrets.PLAYWRIGHT_STAGING_ACCESS_CODE }}
      SELECTED_PACK: ${{ github.event.inputs.pack || 'all' }}
    steps:
      - name: Validate Release Bus inputs
        if: github.event_name == 'workflow_dispatch' && inputs.operation_key != ''
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          FRONTEND_ARTIFACT_DIGEST: ${{ inputs.frontend_artifact_digest }}
          FRONTEND_SHA: ${{ inputs.frontend_sha }}
          BACKEND_ARTIFACT_DIGEST: ${{ inputs.backend_artifact_digest }}
          BACKEND_SHA: ${{ inputs.backend_sha }}
          MANIFEST_ID: ${{ inputs.release_manifest_id }}
          MANIFEST_IDENTITY: ${{ inputs.release_manifest_identity_sha256 }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          SOURCE_REF: ${{ inputs.source_ref }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          TRAIN_REVISION: ${{ inputs.release_train_revision }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$TRAIN_REVISION" =~ ^[1-9][0-9]{0,8}$ ]]
          [[ "$OPERATION_KEY" =~ ^[A-Za-z0-9:._-]{1,180}$ ]]
          [[ "$SOURCE_REF" =~ ^[A-Za-z0-9._/-]{1,255}$ ]]
          [[ "$MANIFEST_ID" =~ ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$ ]]
          [[ "$MANIFEST_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ -z "$FRONTEND_SHA" || "$FRONTEND_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ -z "$BACKEND_SHA" || "$BACKEND_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ -z "$FRONTEND_ARTIFACT_DIGEST" || "$FRONTEND_ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]]
          [[ -z "$BACKEND_ARTIFACT_DIGEST" || "$BACKEND_ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]]
          test -n "$FRONTEND_SHA$BACKEND_SHA"

      - name: Authorize Release Bus E2E operation
        if: github.event_name == 'workflow_dispatch' && inputs.operation_key != ''
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          MANIFEST_IDENTITY: ${{ inputs.release_manifest_identity_sha256 }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg expected_sha "$EXPECTED_SHA" --arg artifact_digest "$MANIFEST_IDENTITY" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:null,repository:"frontend",environment:"staging",service:null,expected_sha:$expected_sha,artifact_digest:$artifact_digest}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/authorize"

      # workflow_run: the exact SHA the staging deploy shipped. Manual
      # dispatch falls back to the branch tip, which may differ from what is
      # currently deployed to staging — fine for ad-hoc reruns, but prefer
      # letting the deploy trigger this workflow for deployed-SHA fidelity.
      - name: Check out the deployed ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.expected_sha || github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Verify Release Bus immutable source
        if: github.event_name == 'workflow_dispatch' && inputs.operation_key != ''
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Stage immutable Release Bus E2E tooling
        env:
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$WORKFLOW_SHA" =~ ^[a-f0-9]{40}$ ]]
          git cat-file -e "$WORKFLOW_SHA^{commit}" 2>/dev/null || \
            git fetch --no-tags origin "$WORKFLOW_SHA"
          tooling="$RUNNER_TEMP/release-bus-tooling/scripts"
          mkdir -p "$tooling" "$RUNNER_TEMP/release-bus-evidence"
          for file in \
            scripts/release-bus-install-dependencies.cjs
          do
            git show "$WORKFLOW_SHA:$file" > "$RUNNER_TEMP/release-bus-tooling/$file"
          done
          {
            echo "RELEASE_BUS_INSTALL_TOOL=$tooling/release-bus-install-dependencies.cjs"
            echo "RELEASE_BUS_INSTALL_EVIDENCE=$RUNNER_TEMP/release-bus-evidence/dependency-install.json"
          } >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Activate pinned pnpm
        run: |
          corepack enable pnpm
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install Socket Firewall
        id: socket-firewall
        continue-on-error: true
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with:
          mode: firewall

      - name: Assert npm lockfile is absent
        run: ./bin/6529 guard:no-package-lock

      - name: Install and verify frozen dependencies
        id: dependencies
        continue-on-error: true
        env:
          RELEASE_BUS_SOCKET_FIREWALL_OUTCOME: ${{ steps.socket-firewall.outcome }}
          SFW_BIN: ${{ steps.socket-firewall.outputs.firewall-path-binary }}
        run: node "$RELEASE_BUS_INSTALL_TOOL"

      - name: Install Playwright browser
        if: steps.dependencies.outcome == 'success'
        id: playwright
        continue-on-error: true
        run: ./bin/6529 exec playwright install --with-deps chromium

      - name: Run staging packs against staging.6529.io
        if: steps.dependencies.outcome == 'success' && steps.playwright.outcome == 'success'
        id: e2e
        continue-on-error: true
        run: |
          set -euo pipefail
          args=(
            --env staging
            --trigger post-deploy
            --artifact-root staging-e2e-artifacts
          )
          if [ "${SELECTED_PACK:-all}" != all ]; then
            args+=(--pack "$SELECTED_PACK")
          fi
          ./bin/6529 run e2e:packs -- "${args[@]}"

      - name: Upload Playwright artifacts on failure
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-e2e-artifacts
          path: staging-e2e-artifacts/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report structured Release Bus E2E result
        if: always() && github.event_name == 'workflow_dispatch' && inputs.operation_key != ''
        env:
          DEPENDENCIES_OUTCOME: ${{ steps.dependencies.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PLAYWRIGHT_OUTCOME: ${{ steps.playwright.outcome }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          SOCKET_OUTCOME: ${{ steps.socket-firewall.outcome }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          status=SUCCEEDED
          failure_class=null
          failure_phase=null
          retryable=false
          if [ "$SOCKET_OUTCOME" != success ] || [ "$DEPENDENCIES_OUTCOME" != success ] || [ "$PLAYWRIGHT_OUTCOME" != success ]; then
            status=FAILED
            failure_class=INFRASTRUCTURE
            failure_phase=staging_e2e_setup
            retryable=true
          elif [ "$E2E_OUTCOME" != success ]; then
            status=FAILED
            failure_class=E2E
            failure_phase=staging_e2e
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --arg failure_phase "$failure_phase" --argjson retryable "$retryable" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $failure_phase == "null" then null else $failure_phase end),retryable:$retryable,summary:null,stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"

      - name: Return staging E2E result
        if: always()
        env:
          DEPENDENCIES_OUTCOME: ${{ steps.dependencies.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PLAYWRIGHT_OUTCOME: ${{ steps.playwright.outcome }}
        run: |
          test "$DEPENDENCIES_OUTCOME" = success
          test "$PLAYWRIGHT_OUTCOME" = success
          test "$E2E_OUTCOME" = success
