name: Web Deploy - PROD

on: workflow_dispatch

permissions:
  contents: read

concurrency:
  group: web-deploy-prod
  cancel-in-progress: false

env:
  AWS_BUCKET: "seize-web"
  COMMIT_SHA: "${{ github.sha }}"
  AWS_REGION: "us-east-1"
  BEANSTALK_APP_NAME: "seize app"
  BEANSTALK_ENV_NAME: "seizeapp-env-node22"
  API_ENDPOINT: "https://api.6529.io"
  WS_ENDPOINT: "wss://ws.6529.io"
  ALLOWLIST_API_ENDPOINT: "https://allowlist-api.6529.io"
  BASE_ENDPOINT: "https://6529.io"
  NEXTGEN_CHAIN_ID: "1"
  MOBILE_APP_SCHEME: "mobile6529"
  CORE_SCHEME: "core6529"
  IPFS_API_ENDPOINT: "https://api-ipfs.6529.io"
  IPFS_GATEWAY_ENDPOINT: "https://ipfs.6529.io"
  ASSETS_FROM_S3: "true"

jobs:
  assert-main-ref:
    name: Assert main ref
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Assert production deploy runs from main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Production deploys must be run from the main branch. Selected ref: ${GITHUB_REF_NAME} (${GITHUB_SHA})."
            exit 1
          fi

  build-upload-deploy:
    needs: assert-main-ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create deployment bus manifest
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs create-manifest \
            --environment production \
            --production-candidate-sha "${COMMIT_SHA}" \
            --production-eligible true \
            --required-packs "playwright:core-smoke,playwright:surface-matrix,playwright:wcag-i18n" \
            --release-captain "github-actions/${{ github.actor }}" \
            --status queued \
            --phase queued \
            --message "Production deployment queued for ${COMMIT_SHA}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output deployment-bus-manifest.json

      - name: Create GitHub deployment record
        id: deployment-record
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          deployment_id="$(node ops/scripts/deployment-bus.cjs github-create-deployment \
            --file deployment-bus-manifest.json \
            --ref "${COMMIT_SHA}" \
            --environment production \
            --task deploy:production \
            --description "Production deployment bus ${COMMIT_SHA}")"
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Mark production deployment queued
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state queued \
            --description "Production deployment bus queued" \
            --environment-url "https://6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Activate pinned pnpm
        run: |
          corepack enable pnpm
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
          pnpm --version

      - name: Install Socket Firewall
        id: socket_firewall
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with:
          mode: firewall

      - name: Assert npm lockfile is absent
        run: ./bin/6529 guard:no-package-lock

      - name: Install dependencies
        env:
          SFW_BIN: ${{ steps.socket_firewall.outputs.firewall-path-binary }}
        run: ./bin/6529 install:frozen

      - name: Lint package.json versions
        run: ./bin/6529 lint:package-json

      - name: Build App
        env:
          NODE_ENV: "production"
          API_ENDPOINT: ${{ env.API_ENDPOINT }}
          ALLOWLIST_API_ENDPOINT: ${{ env.ALLOWLIST_API_ENDPOINT }}
          BASE_ENDPOINT: ${{ env.BASE_ENDPOINT }}
          VERSION: ${{ env.COMMIT_SHA }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          NEXTGEN_CHAIN_ID: ${{ env.NEXTGEN_CHAIN_ID }}
          TENOR_API_KEY: ${{ secrets.TENOR_API_KEY }}
          AWS_RUM_APP_ID: ${{ secrets.AWS_RUM_APP_ID }}
          AWS_RUM_REGION: ${{ secrets.AWS_RUM_REGION }}
          AWS_RUM_SAMPLE_RATE: ${{ secrets.AWS_RUM_SAMPLE_RATE }}
          NEXT_PUBLIC_MIXPANEL_TOKEN: ${{ secrets.NEXT_PUBLIC_MIXPANEL_TOKEN }}
          ASSETS_FROM_S3: ${{ env.ASSETS_FROM_S3 }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./bin/6529 run build

      - name: Build Target
        run: |
          rm -rf target .deploy-bundle
          mkdir -p target/_next .deploy-bundle/.next

          test -f .next/standalone/server.js
          cp -r .next/standalone/. .deploy-bundle/
          cp -r .next/static target/_next/
          cp -r .next/static .deploy-bundle/.next/
          cp -r public .deploy-bundle/
          cp Procfile .deploy-bundle/
          cp -r .ebextensions .deploy-bundle/
          if [ -d .platform ]; then
            cp -r .platform .deploy-bundle/
          fi

          # Next standalone can include dangling pnpm symlinks that Elastic
          # Beanstalk trips over during StageApplication ownership fixes.
          find .deploy-bundle -xtype l -delete

          for file in BUILD_ID PUBLIC_RUNTIME.json ASSETS_FROM_S3; do
            if [ -f ".next/$file" ]; then
              cp ".next/$file" ".deploy-bundle/.next/$file"
            fi
          done

          (
            cd .deploy-bundle
            zip -yr ../target/package.zip .
          )

      - name: Verify package bundle size
        run: |
          PACKAGE_SIZE_BYTES=$(stat -c%s target/package.zip)
          PACKAGE_SIZE_MB=$((PACKAGE_SIZE_BYTES / 1024 / 1024))
          MAX_SIZE_BYTES=$((500 * 1024 * 1024))
          echo "package.zip size: ${PACKAGE_SIZE_MB} MB (${PACKAGE_SIZE_BYTES} bytes)"
          if [ "$PACKAGE_SIZE_BYTES" -gt "$MAX_SIZE_BYTES" ]; then
            echo "Elastic Beanstalk source bundle exceeds the 500 MB limit."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm main did not advance before production mutation
        run: |
          set -euo pipefail

          git fetch --no-tags origin main
          latest_main_sha="$(git rev-parse origin/main)"
          node ops/scripts/deployment-bus.cjs production-preflight \
            --file deployment-bus-manifest.json \
            --current-main-sha "$latest_main_sha" \
            --remote origin \
            --branch main

      - name: Upload assets to S3
        run: aws s3 sync target s3://${{ env.AWS_BUCKET }}/web_build/${{ env.COMMIT_SHA }}/

      - name: Get commit message
        run: echo "COMMIT_MESSAGE=$(git show -s --format=%s)" >> $GITHUB_ENV

      - name: Mark production deployment in progress
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state in_progress \
            --description "Production Elastic Beanstalk deployment starting" \
            --environment-url "https://6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Ensure ElasticBeanstalk Application Version
        run: |
          set -euo pipefail

          SOURCE_BUNDLE_KEY="web_build/${COMMIT_SHA}/package.zip"

          create_application_version() {
            aws elasticbeanstalk create-application-version \
              --application-name "${BEANSTALK_APP_NAME}" \
              --source-bundle S3Bucket="${AWS_BUCKET}",S3Key="${SOURCE_BUNDLE_KEY}" \
              --version-label "${COMMIT_SHA}" \
              --description "${COMMIT_MESSAGE}"
          }

          APPLICATION_VERSION_JSON=$(aws elasticbeanstalk describe-application-versions \
            --application-name "${BEANSTALK_APP_NAME}" \
            --version-labels "${COMMIT_SHA}" \
            --output json)
          VERSION_COUNT=$(jq '.ApplicationVersions | length' <<< "$APPLICATION_VERSION_JSON")

          case "$VERSION_COUNT" in
            0)
              echo "Creating Elastic Beanstalk application version ${COMMIT_SHA}."
              create_application_version
              ;;
            1)
              EXISTING_BUCKET=$(jq -r '.ApplicationVersions[0].SourceBundle.S3Bucket // ""' <<< "$APPLICATION_VERSION_JSON")
              EXISTING_KEY=$(jq -r '.ApplicationVersions[0].SourceBundle.S3Key // ""' <<< "$APPLICATION_VERSION_JSON")

              if [ "$EXISTING_BUCKET" = "$AWS_BUCKET" ] && [ "$EXISTING_KEY" = "$SOURCE_BUNDLE_KEY" ]; then
                echo "Elastic Beanstalk application version ${COMMIT_SHA} already exists with the expected source bundle; reusing it."
              else
                echo "::error::Elastic Beanstalk application version ${COMMIT_SHA} already exists with unexpected source s3://${EXISTING_BUCKET}/${EXISTING_KEY}; expected s3://${AWS_BUCKET}/${SOURCE_BUNDLE_KEY}. Refusing to replace an unexpected production version label automatically."
                exit 1
              fi
              ;;
            *)
              echo "::error::Expected at most one Elastic Beanstalk application version for ${COMMIT_SHA}, found ${VERSION_COUNT}."
              exit 1
              ;;
          esac

      - name: Deploy new Version to ElasticBeanstalk with Runtime Environment Variables
        env:
          SSR_CLIENT_ID: ${{ secrets.SSR_CLIENT_ID }}
          SSR_CLIENT_SECRET: ${{ secrets.SSR_CLIENT_SECRET }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          GITHUB_LINK_STATUS_PREVIEW_TOKEN: ${{ secrets.LINK_STATUS_PREVIEW_GITHUB_TOKEN }}
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.BEANSTALK_APP_NAME }}" \
            --environment-name "${{ env.BEANSTALK_ENV_NAME }}" \
            --version-label "${{ env.COMMIT_SHA }}" \
            --option-settings \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SSR_CLIENT_ID,Value=${SSR_CLIENT_ID}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SSR_CLIENT_SECRET,Value=${SSR_CLIENT_SECRET}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=ALCHEMY_API_KEY,Value=${ALCHEMY_API_KEY}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=GITHUB_LINK_STATUS_PREVIEW_TOKEN,Value=${GITHUB_LINK_STATUS_PREVIEW_TOKEN}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SENTRY_SERVER_INSTRUMENTATION,Value=false"

      - name: Check Elastic Beanstalk health and readiness (120s warmup then 20 retries with 60s delay)
        env:
          DEPLOYMENT_ID: ${{ steps.deployment-record.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Warmup..."
          MAX_RETRIES=20
          COUNTER=0
          sleep 120
          while : ; do
            ENV_HEALTH=$(aws elasticbeanstalk describe-environments --environment-names ${{ env.BEANSTALK_ENV_NAME }} --query 'Environments[0].Health' --output text)
            ENV_STATUS=$(aws elasticbeanstalk describe-environments --environment-names ${{ env.BEANSTALK_ENV_NAME }} --query 'Environments[0].Status' --output text)
            echo "Environment health: $ENV_HEALTH"
            echo "Environment status: $ENV_STATUS"
            if [ $((COUNTER % 5)) -eq 0 ]; then
              node ops/scripts/deployment-bus.cjs github-create-status \
                --deployment-id "$DEPLOYMENT_ID" \
                --state in_progress \
                --description "Production EB health=$ENV_HEALTH status=$ENV_STATUS after $COUNTER checks" \
                --environment-url "https://6529.io" \
                --log-url "$RUN_URL" || true
            fi
            if [[ $ENV_HEALTH == "Green" && $ENV_STATUS == "Ready" ]]; then
              echo "Environment is healthy and ready!"
              break
            elif [[ $COUNTER -eq $MAX_RETRIES ]]; then
              echo "Environment did not become healthy and ready within the expected time."
              exit 1
            fi
            COUNTER=$((COUNTER+1))
            echo "Waiting for environment to become healthy and ready... Attempt: $COUNTER"
            sleep 60
          done

      - name: Validate Deployment
        run: |
          DEPLOYED_BEANSTALK_VERSION=$(aws elasticbeanstalk describe-environments \
            --environment-names ${{ env.BEANSTALK_ENV_NAME }} \
            --query 'Environments[0].VersionLabel' \
            --output text)
          echo "Current deployed version is $DEPLOYED_BEANSTALK_VERSION"
          if [ "$DEPLOYED_BEANSTALK_VERSION" != "${{ env.COMMIT_SHA }}" ]; then
            echo "Deployed version does not match the commit SHA."
            exit 1
          else
            echo "Deployed version valid!"
          fi

      - name: Verify production HTTP version
        run: |
          set -euo pipefail

          node ops/scripts/verify-deployment-version.cjs \
            --base-url https://6529.io \
            --expected-version "${COMMIT_SHA}" \
            --attempts 12 \
            --delay-ms 10000 \
            --timeout-ms 10000 \
            --output deployment-version-evidence.json

          node ops/scripts/deployment-bus.cjs record-post-deploy-watch \
            --file deployment-bus-manifest.json \
            --status in_progress \
            --observed-duration-minutes 0 \
            --checkpoint http-version-match \
            --checkpoint-status passed \
            --evidence "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --notes "GET /api/version matched the production commit SHA."

      - name: Mark production deployment terminal
        if: always() && steps.deployment-record.outputs.deployment_id != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          case "$JOB_STATUS" in
            success)
              state="success"
              manifest_status="deploy_verified"
              description="Production deployment verified"
              ;;
            cancelled)
              state="error"
              manifest_status="cancelled"
              description="Production deployment cancelled before verification"
              ;;
            *)
              state="failure"
              manifest_status="failed"
              description="Production deployment failed before verification"
              ;;
          esac

          node ops/scripts/deployment-bus.cjs heartbeat-manifest \
            --file deployment-bus-manifest.json \
            --status "$manifest_status" \
            --phase terminal \
            --message "$description"

          node ops/scripts/deployment-bus.cjs github-create-status \
            --deployment-id "${{ steps.deployment-record.outputs.deployment_id }}" \
            --state "$state" \
            --description "$description" \
            --environment-url "https://6529.io" \
            --log-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Record production post-deploy watch checkpoint
        if: always() && hashFiles('deployment-bus-manifest.json') != ''
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ "$JOB_STATUS" = "success" ]; then
            watch_status="in_progress"
            checkpoint_status="passed"
            observed_minutes="0"
            notes="Elastic Beanstalk health/readiness and deployed version validation passed; release-captain post-deploy watch still needs deployed-environment validation evidence."
          else
            watch_status="failed"
            checkpoint_status="failed"
            observed_minutes="0"
            notes="Production workflow did not complete deploy verification successfully."
          fi

          node ops/scripts/deployment-bus.cjs record-post-deploy-watch \
            --file deployment-bus-manifest.json \
            --status "$watch_status" \
            --observed-duration-minutes "$observed_minutes" \
            --checkpoint eb-version-health \
            --checkpoint-status "$checkpoint_status" \
            --evidence "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --notes "$notes"

      - name: Create production release report
        if: always()
        run: |
          if [ -f deployment-bus-manifest.json ]; then
            node ops/scripts/deployment-bus.cjs release-report \
              --file deployment-bus-manifest.json \
              --output deployment-release-report.md
          else
            echo "No deployment-bus-manifest.json was created; skipping release report."
          fi

      - name: Upload deployment bus manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deployment-bus-production-${{ env.COMMIT_SHA || github.run_id }}
          path: |
            deployment-bus-manifest.json
            deployment-release-report.md
            deployment-version-evidence.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Notify about failure
        uses: sarisia/actions-status-discord@v1
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: "Seize PROD WEB DEPLOY: CI pipeline is broken!!!"
          description: ${{ env.COMMIT_SHA }} - ${{ env.COMMIT_MESSAGE }}
          content: "<@&1162355330798325861>"
          color: 0xff0000

      - name: Notify about success
        uses: sarisia/actions-status-discord@v1
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: "Seize PROD WEB DEPLOY: CI pipeline complete"
          description: ${{ env.COMMIT_SHA }} - ${{ env.COMMIT_MESSAGE }}
          color: 0x00ff00
