name: Release Bus v2 - Preflight Frontend

on:
  workflow_dispatch:
    inputs:
      release_train_id: { type: string, required: true }
      release_train_revision: { type: string, required: true }
      operation_key: { type: string, required: true }
      source_ref: { type: string, required: true }
      expected_sha: { type: string, required: true }
      deploy_units: { type: string, required: true }
      artifact_environment:
        { type: choice, required: true, options: [staging, production] }
      reuse_artifact_run_id: { type: string, required: false, default: "" }
      reuse_artifact_name: { type: string, required: false, default: "" }
      reuse_artifact_digest: { type: string, required: false, default: "" }

run-name: Preflight frontend v2 train ${{ inputs.release_train_id }} [${{ inputs.operation_key }}]

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # The control plane supplies an immutable in-repository SHA. This job has
      # no secrets, write token, or cache and exists to execute candidate code.
      # codeql[actions/untrusted-checkout/medium]
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - name: Validate exact inputs
        env:
          ARTIFACT_ENVIRONMENT: ${{ inputs.artifact_environment }}
          DEPLOY_UNITS: ${{ inputs.deploy_units }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          REUSE_ARTIFACT_DIGEST: ${{ inputs.reuse_artifact_digest }}
          REUSE_ARTIFACT_NAME: ${{ inputs.reuse_artifact_name }}
          REUSE_ARTIFACT_RUN_ID: ${{ inputs.reuse_artifact_run_id }}
          SOURCE_REF: ${{ inputs.source_ref }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          TRAIN_REVISION: ${{ inputs.release_train_revision }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$TRAIN_REVISION" =~ ^[1-9][0-9]{0,8}$ ]]
          [[ "$OPERATION_KEY" =~ ^rb2:[A-Za-z0-9:._-]+:a[1-9][0-9]*$ ]]
          [[ "$SOURCE_REF" =~ ^[A-Za-z0-9._/-]{1,255}$ ]]
          [[ "$ARTIFACT_ENVIRONMENT" =~ ^(staging|production)$ ]]
          jq -e 'type == "array" and length == 0' <<< "$DEPLOY_UNITS"
          if [ -n "$REUSE_ARTIFACT_RUN_ID" ]; then
            [[ "$REUSE_ARTIFACT_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
            [[ "$REUSE_ARTIFACT_NAME" =~ ^release-bus-v2-pr-[a-f0-9]{40}$ ]]
            [[ "$REUSE_ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]]
          else
            test -z "$REUSE_ARTIFACT_NAME"
            test -z "$REUSE_ARTIFACT_DIGEST"
          fi
      - name: Authorize exact v2 operation
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg expected_sha "$EXPECTED_SHA" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:null,repository:"frontend",environment:"orchestration",service:null,expected_sha:$expected_sha,artifact_digest:null}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/authorize"

  reuse:
    if: inputs.reuse_artifact_run_id != ''
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
    steps:
      - name: Bind exact green PR artifact identity
        id: identity
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REUSE_ARTIFACT_DIGEST: ${{ inputs.reuse_artifact_digest }}
          REUSE_ARTIFACT_NAME: ${{ inputs.reuse_artifact_name }}
          REUSE_ARTIFACT_RUN_ID: ${{ inputs.reuse_artifact_run_id }}
        run: |
          set -euo pipefail
          response="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$REUSE_ARTIFACT_RUN_ID/artifacts?name=$REUSE_ARTIFACT_NAME")"
          artifact="$(jq -c --arg name "$REUSE_ARTIFACT_NAME" '.artifacts | map(select(.expired == false and .name == $name))' <<< "$response")"
          test "$(jq 'length' <<< "$artifact")" -eq 1
          test "$(jq -r '.[0].digest | sub("^sha256:"; "")' <<< "$artifact")" = "$REUSE_ARTIFACT_DIGEST"
      - name: Download exact green PR artifact
        id: download
        if: steps.identity.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.reuse_artifact_run_id }}
          name: ${{ inputs.reuse_artifact_name }}
          path: release-bus-artifact
      - name: Verify and bind exact dual-profile artifact without rebuilding
        id: verify
        if: steps.download.outcome == 'success'
        continue-on-error: true
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          cd release-bus-artifact
          jq -e --arg source_sha "$EXPECTED_SHA" '
            .source_sha == $source_sha and .repository == "frontend" and
            .environment == "dual" and
            (.profiles.staging.package_sha256 | test("^[a-f0-9]{64}$")) and
            (.profiles.production.package_sha256 | test("^[a-f0-9]{64}$"))
          ' manifest.json >/dev/null
          sha256sum -c SHA256SUMS
          test -f profiles/staging/target/package.zip
          test -f profiles/production/target/package.zip
          jq --arg train_id "$TRAIN_ID" '. + {train_id:$train_id,reused_exact_pr_artifact:true}' manifest.json > manifest.next.json
          mv manifest.next.json manifest.json
          find . -type f ! -path ./SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - name: Upload train-bound immutable artifact
        id: upload
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-frontend-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}
          path: release-bus-artifact
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - name: Report exact reuse result
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          IDENTITY_OUTCOME: ${{ steps.identity.outcome }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          if [ "$IDENTITY_OUTCOME" = success ] && [ "$DOWNLOAD_OUTCOME" = success ] && [ "$VERIFY_OUTCOME" = success ] && [ "$UPLOAD_OUTCOME" = success ]; then
            status=SUCCEEDED; failure_class=null; retryable=false
            digest="$(sha256sum release-bus-artifact/SHA256SUMS | cut -d' ' -f1)"
          elif [ "$IDENTITY_OUTCOME" != success ]; then
            status=FAILED; failure_class=CONTROL_PLANE; retryable=false; digest=''
          elif [ "$DOWNLOAD_OUTCOME" != success ] || [ "$UPLOAD_OUTCOME" != success ]; then
            status=FAILED; failure_class=INFRASTRUCTURE; retryable=true; digest=''
          else
            status=FAILED; failure_class=CONTROL_PLANE; retryable=false; digest=''
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --argjson retryable "$retryable" --arg digest "$digest" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $status == "FAILED" then "artifact_reuse" else null end),retryable:$retryable,summary:{artifact_digest:(if $digest == "" then null else $digest end),fresh_or_reused:"reused"},stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" -H 'Content-Type: application/json' --data "$payload" "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Return authoritative reuse result
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          IDENTITY_OUTCOME: ${{ steps.identity.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: test "$IDENTITY_OUTCOME" = success -a "$DOWNLOAD_OUTCOME" = success -a "$VERIFY_OUTCOME" = success -a "$UPLOAD_OUTCOME" = success

  quality:
    if: inputs.reuse_artifact_run_id == ''
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        shard: [lint, typecheck, inventory, tests-1, tests-2, tests-3, tests-4]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: Activate pinned pnpm
        run: |
          corepack enable pnpm
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
      - name: Install Socket Firewall
        id: socket-firewall
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with: { mode: firewall }
      - name: Install frozen dependencies
        env:
          SFW_BIN: ${{ steps.socket-firewall.outputs.firewall-path-binary }}
        run: ./bin/6529 install:frozen
      - name: Run independent quality shard
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          case "$SHARD" in
            lint) ./bin/6529 run lint:quiet ;;
            typecheck) ./bin/6529 run typecheck:ci ;;
            inventory)
              mkdir -p release-bus-test-inventory
              NODE_ENV=test ./bin/6529 exec jest --silent --coverage=false --listTests \
                | sort -u > release-bus-test-inventory/complete.txt
              test -s release-bus-test-inventory/complete.txt
              ;;
            tests-*)
              shard_index="${SHARD#tests-}"
              [[ "$shard_index" =~ ^[1-4]$ ]]
              mkdir -p release-bus-test-inventory
              NODE_ENV=test ./bin/6529 exec jest --silent --coverage=false --listTests \
                --shard="$shard_index/4" \
                | sort -u > "release-bus-test-inventory/shard-$shard_index.txt"
              test -s "release-bus-test-inventory/shard-$shard_index.txt"
              ./bin/6529 run test:no-coverage -- --runInBand --shard="$shard_index/4"
              ;;
          esac
          test -z "$(git status --porcelain --untracked-files=no)"
      - name: Upload exact Jest inventory evidence
        if: matrix.shard == 'inventory' || startsWith(matrix.shard, 'tests-')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-v2-frontend-test-inventory-${{ github.run_id }}-${{ matrix.shard }}
          path: release-bus-test-inventory
          if-no-files-found: error
          retention-days: 7

  build:
    if: inputs.reuse_artifact_run_id == ''
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, production]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      BUILD_ENVIRONMENT: ${{ matrix.environment }}
      NODE_ENV: production
      API_ENDPOINT: ${{ matrix.environment == 'production' && 'https://api.6529.io' || vars.STAGING_API_ENDPOINT || 'https://api.staging.6529.io' }}
      WS_ENDPOINT: ${{ matrix.environment == 'production' && 'wss://ws.6529.io' || vars.STAGING_WS_ENDPOINT || 'wss://ws.staging.6529.io' }}
      ALLOWLIST_API_ENDPOINT: ${{ matrix.environment == 'production' && 'https://allowlist-api.6529.io' || vars.STAGING_ALLOWLIST_API_ENDPOINT || 'https://allowlist-api.staging.6529.io' }}
      BASE_ENDPOINT: ${{ matrix.environment == 'production' && 'https://6529.io' || 'https://staging.6529.io' }}
      VERSION: ${{ inputs.expected_sha }}
      NEXTGEN_CHAIN_ID: ${{ matrix.environment == 'production' && '1' || vars.STAGING_NEXTGEN_CHAIN_ID || '11155111' }}
      MOBILE_APP_SCHEME: mobile6529
      CORE_SCHEME: core6529
      IPFS_API_ENDPOINT: https://api-ipfs.6529.io
      IPFS_GATEWAY_ENDPOINT: https://ipfs.6529.io
      ASSETS_FROM_S3: ${{ matrix.environment == 'production' && 'true' || 'false' }}
      ANNOUNCED_VERSION_ENDPOINT: ${{ matrix.environment == 'production' && 'https://dnclu2fna0b2b.cloudfront.net/web_build/current-production-version.json' || '' }}
    steps:
      # The control plane supplies an immutable in-repository SHA. This job has
      # no secrets, write token, or cache and exists to build candidate code.
      # codeql[actions/untrusted-checkout/medium]
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: Activate pinned pnpm
        run: |
          corepack enable pnpm
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate
      - name: Install Socket Firewall
        id: socket-firewall
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with: { mode: firewall }
      - name: Install frozen dependencies
        env:
          SFW_BIN: ${{ steps.socket-firewall.outputs.firewall-path-binary }}
        run: ./bin/6529 install:frozen
      - name: Build exact environment profile once
        run: |
          if [ "$BUILD_ENVIRONMENT" = staging ]; then
            unset ANNOUNCED_VERSION_ENDPOINT
          fi
          ./bin/6529 run base-build
      - name: Package immutable environment profile
        run: |
          set -euo pipefail
          mkdir -p release-bus-profile/target/_next release-bus-profile/bundle/.next
          cp -r .next/standalone/. release-bus-profile/bundle/
          cp -r .next/static release-bus-profile/target/_next/
          cp -r .next/static release-bus-profile/bundle/.next/
          cp -r public Procfile .ebextensions release-bus-profile/bundle/
          if [ -d .platform ]; then cp -r .platform release-bus-profile/bundle/; fi
          find release-bus-profile/bundle -xtype l -delete
          for file in BUILD_ID PUBLIC_RUNTIME.json ASSETS_FROM_S3; do
            if [ -f ".next/$file" ]; then cp ".next/$file" "release-bus-profile/bundle/.next/$file"; fi
          done
          (cd release-bus-profile/bundle && zip -yr ../target/package.zip .)
      - name: Upload exact build profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-v2-frontend-build-${{ github.run_id }}-${{ matrix.environment }}
          path: release-bus-profile
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  aggregate:
    if: always() && inputs.reuse_artifact_run_id == '' && needs.authorize.result == 'success'
    needs: [authorize, quality, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
    steps:
      - name: Download exact Jest inventory evidence
        id: inventory_download
        if: needs.quality.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-bus-v2-frontend-test-inventory-${{ github.run_id }}-*
          merge-multiple: true
          path: release-bus-test-inventory
      - name: Prove sharded Jest inventory is exact
        id: inventory_verify
        if: steps.inventory_download.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          test -s release-bus-test-inventory/complete.txt
          for shard in 1 2 3 4; do
            test -s "release-bus-test-inventory/shard-$shard.txt"
          done
          sort release-bus-test-inventory/complete.txt > complete.sorted
          cat release-bus-test-inventory/shard-*.txt | sort > shards.sorted
          test -z "$(uniq -d shards.sorted)"
          test "$(wc -l < shards.sorted)" -eq "$(wc -l < complete.sorted)"
          diff -u complete.sorted shards.sorted
      - name: Download exact staging profile
        id: download_staging
        if: needs.build.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-bus-v2-frontend-build-${{ github.run_id }}-staging
          path: release-bus-artifact/profiles/staging
      - name: Download exact production profile
        id: download_production
        if: needs.build.result == 'success' && steps.download_staging.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-bus-v2-frontend-build-${{ github.run_id }}-production
          path: release-bus-artifact/profiles/production
      - name: Bind dual-profile immutable artifact
        id: bind
        if: needs.build.result == 'success' && steps.download_staging.outcome == 'success' && steps.download_production.outcome == 'success'
        continue-on-error: true
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          staging_digest="$(sha256sum release-bus-artifact/profiles/staging/target/package.zip | cut -d' ' -f1)"
          production_digest="$(sha256sum release-bus-artifact/profiles/production/target/package.zip | cut -d' ' -f1)"
          jq -n \
            --arg train_id "$TRAIN_ID" --arg source_sha "$EXPECTED_SHA" \
            --arg staging_digest "$staging_digest" --arg production_digest "$production_digest" \
            '{schema_version:2,repository:"frontend",train_id:$train_id,source_sha:$source_sha,environment:"dual",reused_exact_pr_artifact:false,profiles:{staging:{package_sha256:$staging_digest},production:{package_sha256:$production_digest}}}' \
            > release-bus-artifact/manifest.json
          (cd release-bus-artifact && find . -type f ! -path ./SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
      - name: Upload one exact frontend artifact
        id: upload
        if: needs.quality.result == 'success' && needs.build.result == 'success' && steps.inventory_verify.outcome == 'success' && steps.bind.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-frontend-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}
          path: release-bus-artifact
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - name: Report structured terminal result
        if: always()
        env:
          BIND_OUTCOME: ${{ steps.bind.outcome }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOWNLOAD_PRODUCTION_OUTCOME: ${{ steps.download_production.outcome }}
          DOWNLOAD_STAGING_OUTCOME: ${{ steps.download_staging.outcome }}
          INVENTORY_DOWNLOAD_OUTCOME: ${{ steps.inventory_download.outcome }}
          INVENTORY_VERIFY_OUTCOME: ${{ steps.inventory_verify.outcome }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        run: |
          set -euo pipefail
          if [ "$QUALITY_RESULT" = success ] && [ "$BUILD_RESULT" = success ] && [ "$INVENTORY_DOWNLOAD_OUTCOME" = success ] && [ "$INVENTORY_VERIFY_OUTCOME" = success ] && [ "$BIND_OUTCOME" = success ] && [ "$UPLOAD_OUTCOME" = success ]; then
            status=SUCCEEDED; failure_class=null; retryable=false
            digest="$(sha256sum release-bus-artifact/SHA256SUMS | cut -d' ' -f1)"
          elif [ "$INVENTORY_VERIFY_OUTCOME" = failure ]; then
            status=FAILED; failure_class=CONTROL_PLANE; retryable=false; digest=''
          elif [ "$INVENTORY_DOWNLOAD_OUTCOME" = failure ] || [ "$DOWNLOAD_STAGING_OUTCOME" = failure ] || [ "$DOWNLOAD_PRODUCTION_OUTCOME" = failure ] || [ "$BIND_OUTCOME" = failure ] || [ "$UPLOAD_OUTCOME" = failure ]; then
            status=FAILED; failure_class=INFRASTRUCTURE; retryable=true; digest=''
          else
            status=FAILED; failure_class=CANDIDATE; retryable=false; digest=''
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --argjson retryable "$retryable" --arg digest "$digest" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $status == "FAILED" then "combined_preflight" else null end),retryable:$retryable,summary:{artifact_digest:(if $digest == "" then null else $digest end),fresh_or_reused:"fresh-dual-profile"},stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" -H 'Content-Type: application/json' --data "$payload" "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Return authoritative preflight result
        if: always()
        env:
          BIND_OUTCOME: ${{ steps.bind.outcome }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOWNLOAD_PRODUCTION_OUTCOME: ${{ steps.download_production.outcome }}
          DOWNLOAD_STAGING_OUTCOME: ${{ steps.download_staging.outcome }}
          INVENTORY_DOWNLOAD_OUTCOME: ${{ steps.inventory_download.outcome }}
          INVENTORY_VERIFY_OUTCOME: ${{ steps.inventory_verify.outcome }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
