name: Release Bus - Deploy Frontend Staging

on:
  workflow_dispatch:
    inputs:
      release_train_id: { type: string, required: true }
      release_train_revision: { type: string, required: true }
      operation_key: { type: string, required: true }
      source_ref: { type: string, required: true }
      expected_sha: { type: string, required: true }
      artifact_run_id: { type: string, required: true }

permissions:
  actions: read
  contents: read

run-name: Deploy frontend staging train ${{ inputs.release_train_id }} [${{ inputs.operation_key }}]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.STAGING_AWS_REGION || 'eu-west-1' }}
  ARTIFACT_BUCKET: ${{ vars.RELEASE_BUS_ARTIFACT_BUCKET || 'seize-web' }}
  ARTIFACT_BUCKET_REGION: ${{ vars.RELEASE_BUS_ARTIFACT_BUCKET_REGION || 'us-east-1' }}
  STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR || '/home/ubuntu/6529seize-frontend' }}
  STAGING_RUN_AS: ${{ vars.STAGING_RUN_AS || 'ubuntu' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      OPERATION_KEY: ${{ inputs.operation_key }}
      SOURCE_REF: ${{ inputs.source_ref }}
      TRAIN_ID: ${{ inputs.release_train_id }}
      TRAIN_REVISION: ${{ inputs.release_train_revision }}
    steps:
      - name: Validate dispatch inputs before using credentials
        env:
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          SOURCE_REF: ${{ inputs.source_ref }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          TRAIN_REVISION: ${{ inputs.release_train_revision }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$ARTIFACT_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$TRAIN_REVISION" =~ ^[1-9][0-9]{0,8}$ ]]
          [[ "$OPERATION_KEY" =~ ^[A-Za-z0-9:._-]{1,180}$ ]]
          [[ "$SOURCE_REF" =~ ^[A-Za-z0-9._/-]{1,255}$ ]]
      - name: Check out exact train source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify immutable source
        run: |
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - name: Download immutable preflight artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.artifact_run_id }}
          name: release-bus-frontend-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}-staging
          path: release-bus-artifact
      - name: Verify and bind immutable artifact
        id: artifact
        env:
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          cd release-bus-artifact
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$ARTIFACT_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$OPERATION_KEY" =~ ^[A-Za-z0-9:._-]{1,180}$ ]]
          jq -e \
            --arg train_id "$TRAIN_ID" \
            --arg source_sha "$EXPECTED_SHA" \
            '.train_id == $train_id and .source_sha == $source_sha and .environment == "staging"' \
            manifest.json >/dev/null
          sha256sum -c SHA256SUMS
          package_digest="$(sha256sum target/package.zip | cut -d' ' -f1)"
          echo "package_digest=$package_digest" >> "$GITHUB_OUTPUT"
          payload="$(jq -n \
            --arg train_id "$TRAIN_ID" \
            --arg operation_key "$OPERATION_KEY" \
            --arg workflow_run_id "$GITHUB_RUN_ID" \
            --arg artifact_run_id "$ARTIFACT_RUN_ID" \
            --arg expected_sha "$EXPECTED_SHA" \
            --arg artifact_digest "$package_digest" \
            '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:$artifact_run_id,repository:"frontend",environment:"staging",service:null,expected_sha:$expected_sha,artifact_digest:$artifact_digest}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus/authorize"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Stage artifact for the managed instance
        id: staged-artifact
        env:
          PACKAGE_DIGEST: ${{ steps.artifact.outputs.package_digest }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$TRAIN_REVISION" =~ ^[1-9][0-9]{0,8}$ ]]
          [[ "$PACKAGE_DIGEST" =~ ^[a-f0-9]{64}$ ]]
          [[ "$ARTIFACT_BUCKET_REGION" =~ ^[a-z]{2}(-gov)?-[a-z]+-[1-9][0-9]*$ ]]
          object_key="release-bus/${TRAIN_ID}/r${TRAIN_REVISION}/staging/frontend/${EXPECTED_SHA}.zip"
          aws s3 cp release-bus-artifact/target/package.zip "s3://${ARTIFACT_BUCKET}/${object_key}" \
            --region "$ARTIFACT_BUCKET_REGION" \
            --metadata "sha256=${PACKAGE_DIGEST},source-sha=${EXPECTED_SHA}"
          url="$(aws s3 presign "s3://${ARTIFACT_BUCKET}/${object_key}" \
            --region "$ARTIFACT_BUCKET_REGION" \
            --expires-in 7200)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Deploy immutable bundle through SSM
        id: send-command
        env:
          ARTIFACT_URL: ${{ steps.staged-artifact.outputs.url }}
          EXPECTED_DIGEST: ${{ steps.artifact.outputs.package_digest }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          REPO_DIR: ${{ env.STAGING_REPO_DIR }}
          RUN_AS: ${{ env.STAGING_RUN_AS }}
        run: |
          set -euo pipefail
          test -n "$INSTANCE_ID"
          {
            printf 'ARTIFACT_URL=%q\n' "$ARTIFACT_URL"
            printf 'EXPECTED_DIGEST=%q\n' "$EXPECTED_DIGEST"
            printf 'EXPECTED_SHA=%q\n' "$EXPECTED_SHA"
            printf 'REPO_DIR=%q\n' "$REPO_DIR"
            printf 'RUN_AS=%q\n' "$RUN_AS"
            cat <<'REMOTE'
          set -euo pipefail
          release_root="$REPO_DIR/.release-bus"
          release_dir="$release_root/releases/$EXPECTED_SHA"
          current_link="$release_root/current"
          previous_target="$(readlink -f "$current_link" 2>/dev/null || true)"
          pm2_json="$(sudo -H -u "$RUN_AS" pm2 jlist)"
          process_count="$(jq '[.[] | select(.name == "6529seize")] | length' <<<"$pm2_json")"
          process_kind=''
          if [ "$process_count" -eq 0 ]; then
            process_kind='absent'
          elif [ "$process_count" -eq 1 ]; then
            process_shape="$(jq -c '[.[] | select(.name == "6529seize")][0] | {
              exec_mode: .pm2_env.exec_mode,
              pm_exec_path: .pm2_env.pm_exec_path,
              pm_cwd: .pm2_env.pm_cwd,
              args: .pm2_env.args
            }' <<<"$pm2_json")"
            if jq -e --arg repo_dir "$REPO_DIR" '
              .exec_mode == "fork_mode" and
              .pm_exec_path == "/usr/bin/bash" and
              .pm_cwd == $repo_dir and
              .args == ["-lc", ("cd \"" + $repo_dir + "\" && ./bin/6529 run start:standalone")]
            ' <<<"$process_shape" >/dev/null; then
              # One historical staging process predates the immutable release layout.
              # Only this exact tuple may take the one-time replacement path below.
              process_kind='legacy'
            elif [ -n "$previous_target" ] && jq -e \
              --arg release_root "$release_root" \
              --arg previous_target "$previous_target" '
              .exec_mode == "cluster_mode" and
              (.args == null or .args == []) and
              (.pm_cwd == ($release_root + "/current") or .pm_cwd == $previous_target) and
              (.pm_exec_path == ($release_root + "/current/server.js") or
                .pm_exec_path == ($previous_target + "/server.js"))
            ' <<<"$process_shape" >/dev/null; then
              process_kind='managed'
            else
              echo 'Refusing to replace an unrecognized 6529seize PM2 process.' >&2
              exit 1
            fi
          else
            echo 'Refusing to deploy with duplicate 6529seize PM2 processes.' >&2
            exit 1
          fi

          restore_previous_link() {
            if [ -n "$previous_target" ]; then
              ln -sfn "$previous_target" "$current_link"
            else
              rm -f "$current_link"
            fi
          }

          wait_for_exact_local_version() {
            for attempt in {1..24}; do
              response="$(curl --fail --silent --show-error --max-time 10 \
                http://127.0.0.1:3001/api/version 2>/dev/null || true)"
              actual_version="$(jq -r '
                select(.stale == false) |
                .version | select(type == "string" and test("^[a-f0-9]{40}$"))
              ' <<<"$response" 2>/dev/null || true)"
              if [ "$actual_version" = "$EXPECTED_SHA" ]; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          restore_legacy_process() {
            sudo -H -u "$RUN_AS" pm2 delete 6529seize >/dev/null 2>&1 || true
            restore_previous_link
            sudo -H -u "$RUN_AS" pm2 start bash --name=6529seize -- \
              -lc "cd \"$REPO_DIR\" && ./bin/6529 run start:standalone"
            for attempt in {1..24}; do
              if curl --fail --silent --show-error --max-time 10 \
                http://127.0.0.1:3001/api/version | jq -e '
                  .stale == false and
                  (.version | type == "string" and test("^[a-f0-9]{40}$"))
                ' >/dev/null 2>&1; then
                sudo -H -u "$RUN_AS" pm2 save
                return 0
              fi
              sleep 5
            done
            return 1
          }

          rollback_managed_process() {
            restore_previous_link
            if [ -n "$previous_target" ]; then
              sudo -H -u "$RUN_AS" pm2 startOrReload \
                "$release_root/ecosystem.config.cjs" --only 6529seize --update-env
            else
              sudo -H -u "$RUN_AS" pm2 delete 6529seize >/dev/null 2>&1 || true
            fi
            sudo -H -u "$RUN_AS" pm2 save
          }

          install -d -o "$RUN_AS" -g "$RUN_AS" "$release_dir"
          http_status="$(curl --silent --show-error --proto '=https' \
            --output "$release_dir/package.zip" \
            --write-out '%{http_code}' \
            "$ARTIFACT_URL")"
          test "$http_status" = 200
          echo "$EXPECTED_DIGEST  $release_dir/package.zip" | sha256sum -c -
          rm -rf "$release_dir/app"
          install -d -o "$RUN_AS" -g "$RUN_AS" "$release_dir/app"
          unzip -q "$release_dir/package.zip" -d "$release_dir/app"
          test -f "$release_dir/app/server.js"
          chown -R "$RUN_AS:$RUN_AS" "$release_dir"
          ln -sfn "$release_dir/app" "$current_link"
          cat > "$release_root/ecosystem.config.cjs" <<'PM2_CONFIG'
          module.exports = {
            apps: [{
              name: '6529seize',
              script: 'server.js',
              cwd: __dirname + '/current',
              exec_mode: 'cluster',
              instances: 1,
              env: { PORT: '3001', HOSTNAME: '0.0.0.0', NODE_ENV: 'production' }
            }]
          };
          PM2_CONFIG
          chown "$RUN_AS:$RUN_AS" "$release_root/ecosystem.config.cjs"

          if [ "$process_kind" = legacy ]; then
            # Future managed releases stay on startOrReload. This bounded replacement
            # is reserved for migrating the exact legacy fork detected above.
            sudo -H -u "$RUN_AS" pm2 delete 6529seize
            if ! sudo -H -u "$RUN_AS" pm2 start \
              "$release_root/ecosystem.config.cjs" --only 6529seize; then
              if ! restore_legacy_process; then
                echo 'CRITICAL: staging migration and legacy rollback both failed.' >&2
                exit 2
              fi
              echo 'Staging migration failed; the known legacy process was restored.' >&2
              exit 1
            fi
          else
            if ! sudo -H -u "$RUN_AS" pm2 startOrReload \
              "$release_root/ecosystem.config.cjs" --only 6529seize --update-env; then
              if ! rollback_managed_process; then
                echo 'CRITICAL: staging deploy and rollback reload both failed.' >&2
                exit 2
              fi
              echo 'Staging deploy failed; the prior managed release was restored.' >&2
              exit 1
            fi
          fi

          if ! wait_for_exact_local_version; then
            if [ "$process_kind" = legacy ]; then
              if ! restore_legacy_process; then
                echo 'CRITICAL: exact-version check and legacy rollback both failed.' >&2
                exit 2
              fi
            elif ! rollback_managed_process; then
              echo 'CRITICAL: exact-version check and managed rollback both failed.' >&2
              exit 2
            fi
            echo 'Instance-local exact-version verification failed; the prior process was restored.' >&2
            exit 1
          fi
          sudo -H -u "$RUN_AS" pm2 save
          REMOTE
          } > remote-script.sh
          bash -n remote-script.sh
          script_base64="$(base64 < remote-script.sh | tr -d '\n')"
          [[ "$script_base64" =~ ^[A-Za-z0-9+/=]+$ ]]
          remote_command="printf '%s' $script_base64 | base64 --decode | bash"
          jq -n --arg command "$remote_command" '{commands:[$command],executionTimeout:["2400"]}' > ssm-parameters.json
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Release Bus frontend staging $EXPECTED_SHA" \
            --parameters file://ssm-parameters.json \
            --timeout-seconds 2400 \
            --query Command.CommandId \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
      - name: Wait for SSM deployment
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command_id }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          set -euo pipefail
          terminal=''
          for attempt in {1..160}; do
            status="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || true)"
            case "$status" in
              Success) terminal="$status"; break ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated) terminal="$status"; break ;;
            esac
            sleep 15
          done
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
          test "$terminal" = Success
      - name: Verify exact staging version
        env:
          STAGING_AUTH: ${{ secrets.STAGING_AUTH }}
        run: |
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          node ops/scripts/verify-deployment-version.cjs \
            --base-url https://staging.6529.io \
            --expected-version "$EXPECTED_SHA" \
            --attempts 18 \
            --delay-ms 10000 \
            --timeout-ms 10000 \
            --output deployment-version-evidence.json
      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-staging-deploy-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}
          path: deployment-version-evidence.json
          if-no-files-found: ignore
          retention-days: 90
