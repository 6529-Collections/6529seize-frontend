sonar.projectKey=6529-collections_6529seize-frontend
sonar.organization=6529-collections
# Static article packages are reviewed content artifacts, not runtime code.
# The app/* entries are WordPress-scrape article snapshots (static content,
# not runtime logic); like the delegation article packages they carry no
# analysis signal, and their parameterized asset-chrome invocations trip the
# new-code duplication gate.
# tests/packs.manifest.ts is a declarative data registry of ~50 repetitive
# pack literals; token-based duplication detection flags it by construction
# (47.9% internal duplication on introduction). Full exclusion rather than
# sonar.cpd.exclusions because this project's analysis does not honor CPD
# exclusions (same reason the WP-scrape trees were moved to sonar.exclusions).
sonar.exclusions=**/__tests__/**,**/e2e/**,scripts/**,**/__mocks__/**,content/delegation/**,public/delegation-content/**,app/museum/**,app/om/**,app/blog/**,app/about/media/**,app/about/press/**,app/capital/**,app/education/**,app/news/**,tests/packs.manifest.ts
sonar.cpd.exclusions=ops/scripts/build-delegation-docs-content.mjs
