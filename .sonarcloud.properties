# SonarCloud automatic analysis reads THIS file, not sonar-project.properties
# (scanner-CLI config). Main moved the WP-scrape trees to sonar.exclusions in
# 350280b72 with the rationale below, but the exclusion never took effect for
# PR analysis: the press split (#3112) and the fund-szn1 split (#3114) both
# had scrape-content files under these trees analyzed and gate-flagged for
# copy detection. This mirrors the intended exclusions where automatic
# analysis actually looks for them.
#
# Static article packages are reviewed content artifacts, not runtime code.
# The app/* entries are WordPress-scrape article snapshots (static content,
# not runtime logic); they carry no analysis signal, and their uniform
# content/data shapes trip the new-code duplication gate.
sonar.exclusions=**/__tests__/**,**/e2e/**,scripts/**,**/__mocks__/**,content/delegation/**,public/delegation-content/**,app/museum/**,app/om/**,app/blog/**,app/about/media/**,app/about/press/**,app/capital/**,app/education/**,app/news/**
sonar.cpd.exclusions=ops/scripts/build-delegation-docs-content.mjs
