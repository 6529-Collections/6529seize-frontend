# SonarCloud Automatic Analysis reads THIS file (.sonarcloud.properties);
# sonar-project.properties is only consumed by CI-based scanners, which this
# repository does not run. Keep the exclusion lists in both files in sync.
# Rationale (from sonar-project.properties): the excluded app/* trees are
# WordPress-scrape article snapshots — reviewed content artifacts, not
# runtime logic — whose repeated block skeletons trip the new-code
# duplication gate without carrying analysis signal.
sonar.exclusions=**/__tests__/**,**/e2e/**,scripts/**,**/__mocks__/**,content/delegation/**,public/delegation-content/**,app/museum/**,app/om/**,app/blog/**,app/about/media/**,app/about/press/**,app/about/100m-project/**,app/about/mission/**,app/about/open-metaverse/**,app/about/rules/**,app/capital/**,app/education/**,app/news/**
sonar.cpd.exclusions=ops/scripts/build-delegation-docs-content.mjs
