openapi: 3.1.0
info:
  title: 6529 Wallet Auth Session V2
  version: 1.0.0
  description: Contract for web cookie sessions, refresh-token clients, and connection sharing.
servers:
  - url: https://api.6529.io/api
paths:
  /auth/session-nonce:
    get:
      summary: Create a session-v2 signable login message
      parameters:
        - name: signer_address
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EthereumAddress"
        - name: client_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientType"
        - name: chain_id
          in: query
          required: true
          schema:
            type: integer
            enum: [1]
      responses:
        "200":
          description: Signable message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionNonceResponse"
  /auth/session-login:
    post:
      summary: Start a session-v2 wallet session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionLoginRequest"
      responses:
        "201":
          description: Session created
          headers:
            Set-Cookie:
              description: Web clients receive the HttpOnly compatibility 6529_session cookie plus an address-scoped session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SessionWebResponse"
                  - $ref: "#/components/schemas/SessionNativeResponse"
  /auth/session-refresh:
    post:
      summary: Refresh a session-v2 wallet session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SessionRefreshWebRequest"
                - $ref: "#/components/schemas/SessionRefreshNativeRequest"
      responses:
        "201":
          description: Session refreshed
          headers:
            Set-Cookie:
              description: Web clients may receive rotated HttpOnly compatibility and address-scoped session cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SessionWebResponse"
                  - $ref: "#/components/schemas/SessionNativeResponse"
  /auth/session-logout:
    post:
      summary: Revoke a session-v2 wallet session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SessionLogoutWebRequest"
                - $ref: "#/components/schemas/SessionLogoutNativeRequest"
      responses:
        "204":
          description: Session revoked
          headers:
            Set-Cookie:
              description: Web clients receive expired session cookies for the addressed logout scope.
              schema:
                type: string
  /auth/connection-share:
    post:
      summary: Create a one-time connection sharing code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectionShareRequest"
      responses:
        "201":
          description: Connection share code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionShareResponse"
  /auth/connection-share/legacy-desktop:
    post:
      summary: Create a legacy desktop connection sharing link
      description: >
        Migration bridge for 6529 Desktop builds that still redeem legacy refresh
        tokens. Requires bearer auth and a matching active session-v2 web cookie.
        Kept for older desktop builds after desktop moves to session-v2.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLegacyDesktopConnectionShareRequest"
      responses:
        "201":
          description: Legacy desktop connection link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLegacyDesktopConnectionShareResponse"
  /auth/connection-share/redeem:
    post:
      summary: Redeem a one-time connection sharing code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemConnectionShareRequest"
      responses:
        "201":
          description: Refresh-token session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionNativeResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ClientType:
      type: string
      enum: [web, native, desktop]
    RefreshTokenClientType:
      type: string
      enum: [native, desktop]
    EthereumAddress:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    SessionNonceResponse:
      type: object
      required: [signable_message, server_signature]
      additionalProperties: false
      properties:
        signable_message:
          type: string
        server_signature:
          type: string
    SessionLoginRequest:
      type: object
      required: [client_type, client_address, client_signature, server_signature]
      additionalProperties: false
      properties:
        client_type:
          $ref: "#/components/schemas/ClientType"
        client_address:
          $ref: "#/components/schemas/EthereumAddress"
        client_signature:
          type: string
        server_signature:
          type: string
        role:
          type: string
          nullable: true
    SessionWebResponse:
      type: object
      required: [address, access_token, access_token_expires_at, client_type]
      additionalProperties: false
      properties:
        address:
          $ref: "#/components/schemas/EthereumAddress"
        role:
          type: string
          nullable: true
        access_token:
          type: string
        access_token_expires_at:
          type: string
          format: date-time
        client_type:
          type: string
          enum: [web]
    SessionNativeResponse:
      allOf:
        - $ref: "#/components/schemas/SessionWebResponse"
        - type: object
          required: [native_refresh_token, refresh_token_expires_at]
          properties:
            client_type:
              $ref: "#/components/schemas/RefreshTokenClientType"
            native_refresh_token:
              type: string
            refresh_token_expires_at:
              type: string
              format: date-time
    SessionRefreshWebRequest:
      type: object
      required: [client_type]
      additionalProperties: false
      properties:
        client_type:
          type: string
          enum: [web]
        client_address:
          $ref: "#/components/schemas/EthereumAddress"
    SessionRefreshNativeRequest:
      type: object
      required: [client_type, client_address, native_refresh_token]
      additionalProperties: false
      properties:
        client_type:
          $ref: "#/components/schemas/RefreshTokenClientType"
        client_address:
          $ref: "#/components/schemas/EthereumAddress"
        native_refresh_token:
          type: string
    SessionLogoutWebRequest:
      type: object
      required: [client_type, all_sessions]
      additionalProperties: false
      properties:
        client_type:
          type: string
          enum: [web]
        client_address:
          $ref: "#/components/schemas/EthereumAddress"
        all_sessions:
          type: boolean
    SessionLogoutNativeRequest:
      allOf:
        - $ref: "#/components/schemas/SessionRefreshNativeRequest"
        - type: object
          required: [all_sessions]
          properties:
            all_sessions:
              type: boolean
    CreateConnectionShareRequest:
      type: object
      required: [target_client_type]
      additionalProperties: false
      properties:
        target_client_type:
          $ref: "#/components/schemas/RefreshTokenClientType"
        role:
          type: string
          nullable: true
    CreateConnectionShareResponse:
      type: object
      required:
        - connection_share_code
        - expires_at
        - address
        - target_client_type
        - deep_link_path
      additionalProperties: false
      properties:
        connection_share_code:
          type: string
        expires_at:
          type: string
          format: date-time
        address:
          $ref: "#/components/schemas/EthereumAddress"
        role:
          type: string
          nullable: true
        target_client_type:
          $ref: "#/components/schemas/RefreshTokenClientType"
        deep_link_path:
          type: string
          examples:
            - "/accept-connection-sharing?connection_share_code=abc&address=0x0000000000000000000000000000000000000000"
    CreateLegacyDesktopConnectionShareRequest:
      type: object
      additionalProperties: false
      properties:
        role:
          type: string
          nullable: true
    CreateLegacyDesktopConnectionShareResponse:
      type: object
      required: [refresh_token, address, deep_link_path]
      additionalProperties: false
      properties:
        refresh_token:
          type: string
        address:
          $ref: "#/components/schemas/EthereumAddress"
        role:
          type: string
          nullable: true
        deep_link_path:
          type: string
          examples:
            - "/accept-connection-sharing?token=legacy-refresh-token&address=0x0000000000000000000000000000000000000000"
    RedeemConnectionShareRequest:
      type: object
      required: [target_client_type, connection_share_code]
      additionalProperties: false
      properties:
        target_client_type:
          $ref: "#/components/schemas/RefreshTokenClientType"
        connection_share_code:
          type: string
